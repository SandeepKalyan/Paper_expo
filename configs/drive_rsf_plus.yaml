seed: 42

model:
  name: rsf_unet
  in_channels: 3
  out_channels: 1
  base_channels: 16

data:
  name: drive
  root: data/DRIVE
  train_split: train
  val_split: test
  patch_size: [256, 256]
  samples_per_epoch: 1024
  batch_size: 2
  num_workers: 2
  pin_memory: true
  use_paper_augs: true
  vessel_sampling_prob: 0.5

optim:
  lr: 0.0002

train:
  epochs: 200
  output_dir: outputs
  loss: bce_dice

eval:
  threshold: 0.5
  patch_overlap: true
  patch_size: 256
  stride: 128
  tta: true
  threshold_candidates: [0.35, 0.40, 0.45, 0.50, 0.55]
