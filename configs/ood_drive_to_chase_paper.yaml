seed: 42

model:
  name: rsf_paper
  in_channels: 3
  out_channels: 1
  rotNum: 8
  initS: 3
  gapS: 1.25
  numS: 4

data:
  name: chase_db1
  root: data/CHASE_DB1
  train_split: train
  val_split: test
  patch_size: [256, 256]
  batch_size: 1
  num_workers: 2
  pin_memory: true

optim:
  lr: 0.0002

train:
  epochs: 1
  output_dir: outputs

eval:
  threshold: 0.5
  patch_overlap: true
  patch_size: 256
  stride: 128
  tta: true
  threshold_candidates: [0.35, 0.40, 0.45, 0.50, 0.55]
