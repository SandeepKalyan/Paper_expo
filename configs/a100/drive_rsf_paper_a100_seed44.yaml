seed: 44

model:
  name: rsf_paper
  in_channels: 3
  out_channels: 1
  rotNum: 8
  initS: 3
  gapS: 1.25
  numS: 4

data:
  name: drive
  root: data/DRIVE
  train_split: train
  val_split: test
  patch_size: [256, 256]
  samples_per_epoch: 1024
  batch_size: 4
  num_workers: 6
  pin_memory: true
  use_paper_augs: true

optim:
  lr: 0.0002
  weight_decay: 1.0e-5
  scheduler: cosine
  min_lr: 0.0

train:
  epochs: 50
  output_dir: outputs
  loss: bce
  precision: bf16

eval:
  threshold: 0.5
  patch_overlap: true
  patch_size: 256
  stride: 128
  tta: true
  threshold_candidates: [0.35, 0.40, 0.45, 0.50, 0.55]
